<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    
    <meta http-equiv="refresh" content="2; URL='https://monochrome.tf'" />

    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding-top: 50px; }
    </style>
</head>
<body>
    <h1>You are being redirected to the modern Monochrome in 2 seconds.</h1>
    <p>Find the legacy Monochrome by <a href="/legacy">clicking here</a>.</p>
    
    <p>If you aren't redirected automatically, 
       <a href="https://monochrome.tf">click here</a>.
    </p>

    <script>
       setTimeout(function() {
            window.location.href = "https://monochrome.tf";
        }, 2000);
    </script>
</body>
</html>
